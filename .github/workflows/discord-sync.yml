name: Discord Sync

# Discord posts (Ninjas / Espíritus / Modas) are infrequent — sync twice a week.
# Times in UTC; Argentina is UTC-3, so 13:00 UTC = 10:00 ART.
on:
  schedule:
    - cron: '0 13 * * 2'   # Tuesdays 10:00 ART
    - cron: '0 13 * * 5'   # Fridays 10:00 ART
  workflow_dispatch:        # manual trigger from Actions tab

concurrency:
  group: discord-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Discord sync
        env:
          DISCORD_BOT_TOKEN:    ${{ secrets.DISCORD_BOT_TOKEN }}
          BACKEND_URL:          ${{ secrets.BACKEND_URL }}
          API_KEY:              ${{ secrets.API_KEY }}
          DISCORD_CH_NINJAS:    ${{ secrets.DISCORD_CH_NINJAS }}
          DISCORD_CH_ESPIRITUS: ${{ secrets.DISCORD_CH_ESPIRITUS }}
          DISCORD_CH_MODAS:     ${{ secrets.DISCORD_CH_MODAS }}
        run: node scripts/sync-discord.mjs
