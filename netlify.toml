[build]
  command = "npm run build --workspace=frontend"
  functions = "netlify/functions"
  publish = "frontend/.next"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://naruto-online.onrender.com"
  NODE_VERSION = "22"
  NODE_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
