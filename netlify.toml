[build]
command = "cd frontend && npm ci && npm run build"
publish = "frontend/.next"

[env]
NODE_VERSION = "20.18.0"
NODE_ENV = "production"

# Explicitly disable the Next.js plugin - it's incompatible with Next.js 16
[[plugins]]
package = "@netlify/plugin-nextjs"
skip = true

[[redirects]]
from = "/*"
status = 200
to = "/index.html"
