[build]
command = "cd frontend && npm install --legacy-peer-deps && npm run build"
publish = "frontend/.next"

[env]
NODE_VERSION = "20.18.0"
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://naruto-online.onrender.com"

[build.environment]
NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
from = "/*"
status = 200
to = "/index.html"
